<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Frage 2 · QR-Rallye</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* gleiches CSS wie bei Frage 1, leicht angepasst */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f9fafc 0%, #eef2f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2);
            max-width: 480px;
            width: 100%;
            padding: 28px 24px;
        }
        h1 {
            font-size: clamp(1.6rem,6vw,2.2rem);
            font-weight: 700;
            background: linear-gradient(135deg,#1e2b3a,#2b4b6f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .question {
            font-size: 1.2rem;
            margin: 20px 0;
            color: #1e2b3a;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1.1rem;
            border: 2px solid #e2e9f2;
            border-radius: 40px;
            outline: none;
            margin: 20px 0;
        }
        input:focus {
            border-color: #f3b33d;
            box-shadow: 0 0 0 4px rgba(243,179,61,0.2);
        }
        button {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(105deg,#f3b33d,#f5c26b);
            border: none;
            border-radius: 40px;
            color: #1e2b3a;
            cursor: pointer;
            box-shadow: 0 8px 20px -5px rgba(243,179,61,0.5);
            margin-top: 12px;
        }
        #message {
            margin-top: 16px;
            text-align: center;
        }
        .footer-note {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #6f8aa3;
            text-align: center;
            border-top: 1px dashed #d0dfee;
            padding-top: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Frage 2</h1>
        <div class="question">Wie viele Bundesländer hat Deutschland?</div>
        <input type="number" id="answer" placeholder="Zahl eingeben" min="1" max="20">
        <button id="submitBtn">Antwort prüfen</button>
        <div id="message"></div>
        <div class="footer-note"><i class="fa-solid fa-bolt-lightning"></i> Frage 2/10</div>
    </div>

    <script>
        (async function() {
            const token = localStorage.getItem('rallye_token');
            if (!token) { window.location.href = '/signup'; return; }

            // Prüfe, ob Frage 1 bereits richtig beantwortet wurde
            const statusRes = await fetch('/api/quiz-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            const status = await statusRes.json();
            if (status.last_correct < 1) { // Frage 1 muss richtig sein
                window.location.href = '/403';
                return;
            }

            document.getElementById('submitBtn').addEventListener('click', async () => {
                const answer = document.getElementById('answer').value.trim();
                if (!answer) {
                    document.getElementById('message').innerHTML = '<span style="color:#d32f2f;">Bitte eine Zahl eingeben.</span>';
                    return;
                }

                const response = await fetch('/api/quiz-answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, question: 2, answer })
                });
                const data = await response.json();

                if (data.correct) {
                    document.getElementById('message').innerHTML = '<span style="color:#2e7d32;">Richtig! Weiter zur nächsten Frage...</span>';
                    setTimeout(() => { window.location.href = data.next; }, 1000);
                } else {
                    document.getElementById('message').innerHTML = '<span style="color:#d32f2f;">Leider falsch. Versuche es noch einmal.</span>';
                }
            });
        })();
    </script>
</body>
</html>

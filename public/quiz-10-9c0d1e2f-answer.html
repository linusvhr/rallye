<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frage 10 richtig · QR-Rallye</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:linear-gradient(145deg,#f9fafc,#eef2f6); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:12px; }
        .card { background:rgba(255,255,255,0.9); backdrop-filter:blur(15px); border-radius:32px; box-shadow:0 25px 50px -12px rgba(0,0,0,0.2); max-width:480px; width:100%; padding:28px 24px; text-align:center; }
        h1 { font-size:clamp(1.6rem,6vw,2.2rem); font-weight:700; background:linear-gradient(135deg,#1e2b3a,#2b4b6f); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:16px; }
        .success-icon { font-size:4rem; color:#2e7d32; margin:20px 0; }
        .hint {
            background: #eef2f6;
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #f3b33d;
        }
        .hint i { font-size:3rem; color:#f3b33d; margin-bottom:10px; }
        .hint p { font-size:1.1rem; color:#1e2b3a; }
        button { width:100%; padding:14px; font-size:1.1rem; font-weight:700; background:linear-gradient(105deg,#f3b33d,#f5c26b); border:none; border-radius:40px; color:#1e2b3a; cursor:pointer; box-shadow:0 8px 20px -5px rgba(243,179,61,0.5); margin-top:12px; }
        .footer-note { margin-top:20px; font-size:0.8rem; color:#6f8aa3; }
    </style>
</head>
<body>
    <div class="card" id="content" style="display: none;">
        <i class="fa-regular fa-circle-check success-icon"></i>
        <h1>Geschafft! 🎉</h1>
        <p>Du hast alle 10 Fragen richtig beantwortet!</p>

        <div class="hint">
            <i class="fa-solid fa-trophy"></i>
            <p><strong>Belohnung abholen:</strong><br>Gehe zum Lehrerzimmer und zeige diese Nachricht vor.</p>
        </div>

        <button onclick="window.location.href='/tutorial'">
            Zurück zum Tutorial <i class="fa-solid fa-arrow-right"></i>
        </button>

        <div class="footer-note">
            <i class="fa-solid fa-bolt-lightning"></i> Rallye abgeschlossen!
        </div>
    </div>

    <script>
        (async function() {
            const token = localStorage.getItem('rallye_token');
            if (!token) { window.location.href = '/signup'; return; }
            try {
                const res = await fetch('/api/quiz-status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                const data = await res.json();
                if (data.status && data.status[9] === true) {
                    document.getElementById('content').style.display = 'block';
                } else {
                    window.location.href = '/quiz-10-9c0d1e2f';
                }
            } catch (e) {
                window.location.href = '/quiz-10-9c0d1e2f';
            }
        })();
    </script>
</body>
</html>
